<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trova Carburante </title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f5f5f5; color: #2f3d58; }
    button { padding: 12px 24px; font-size: 18px; cursor: pointer; border-radius: 8px; background-color: #2f3d58; color: white; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    button:hover { background-color: #1e2738; }
    #error { color: red; font-weight: bold; display: none; }
    #map { height: 450px; width: 100%; max-width: 800px; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); display: none; }
  </style>
</head>
<body>
  <h1>⛽ Trova Carburante</h1>
  <p>Scopri i distributori vicini a te.</p>
  
  <button id="geo-btn">📍 Trovami sulla mappa</button>
  <p id="error"></p>

  <div id="map"></div>

  <script src="app.js"></script>
</body>
</html>
