<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trova Carburante</title>
  <style>
    body { 
      font-family: sans-serif; 
      text-align: center; 
      padding: 50px; 
      background-color: #f5f5f5; 
      color: #2f3d58;
    }
    button { 
      padding: 12px 24px; 
      font-size: 18px; 
      cursor: pointer; 
      border-radius: 8px; 
      background-color: #2f3d58; 
      color: white; 
      border: none; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    button:hover { background-color: #1e2738; }
    
    #result { 
      margin-top: 30px; 
      padding: 20px; 
      background-color: #e8f5e9; 
      border-radius: 8px; 
      display: none; 
      display: inline-block;
    }
    #error { 
      color: red; 
      margin-top: 20px; 
      font-weight: bold; 
      display: none; 
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>⛽ Trova Carburante</h1>
  <p>Scopri i distributori più economici vicino a te.</p>
  
  <button id="geo-btn">📍 Trova la mia posizione</button>
  
  <div id="result" class="hidden">
    <h3>Coordinate Trovate! ✅</h3>
    <p><strong>Latitudine:</strong> <span id="lat"></span></p>
    <p><strong>Longitudine:</strong> <span id="lng"></span></p>
  </div>
  
  <p id="error" class="hidden"></p>

  <script src="app.js"></script>
</body>
</html>
